name: Documentation

on:
  push:
    branches: [main, next]
  pull_request:

jobs:
  build-docs:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6.2
        uses: compnerd/gha-setup-swift@main
        with:
          source: swift.org
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE

      - name: Build Documentation
        run: |
          swift package --allow-writing-to-directory documentation generate-documentation --target SwiftDisc --output-path documentation || (echo "Documentation generation skipped (plugin not available)"; mkdir -p documentation)

      - name: Archive Documentation
        if: always()
        run: tar -czf documentation.tar.gz documentation/ || true

      - name: Upload Documentation Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: documentation.tar.gz

  deploy-docs:
    needs: build-docs
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download Documentation Artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation

      - name: Extract Documentation
        run: tar -xzf documentation.tar.gz

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./documentation
